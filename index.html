<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLICK | Underground Apparel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER ESTILO A – PRETO + VERMELHO -->
  <header class="main-header dark-header">
    <div class="logo">BLICK</div>

    <nav class="main-nav">
      <a href="#">SHOP</a>
      <a href="#">LOOKBOOK</a>
      <a href="#">CONTATO</a>
    </nav>

    <div class="user-actions">
      <a href="#">BUSCA</a>
      <a href="#">CARRINHO (0)</a>
    </div>
  </header>

  <!-- SEARCH BAR -->
  <section class="search-container">
    <div class="glass-search-bar red-accent">
      <input type="text" placeholder="BUSCAR PRODUTO (nome, SKU, cor...)">
      <button>BUSCAR</button>
    </div>
  </section>

  <!-- HERO -->
  <section class="hero-carousel">
    <div class="carousel-item active">
      <img src="telechargement_57.jpg" alt="Coleção Inverno '26" class="carousel-img">
      <div class="carousel-caption">
        <h1>NOVA COLEÇÃO: INVERNO '26</h1>
        <p>Onde a arte encontra a rua. Peças limitadas.</p>
        <a href="#" class="btn-shop red-button">VER ITENS</a>
      </div>
    </div>
  </section>

  <!-- PRODUTOS -->
  <main>
    <section class="product-grid">
      <h2 class="red-title">ITENS EM DESTAQUE</h2>
      <div class="grid-container">

        <a href="produto.html" target="_blank" class="item">
          <img src="mac.webp" alt="CAMISETA VAZIA">
          <p class="item-name">CAMISETA VAZIA</p>
          <p class="item-price">R$ 159,00</p>
        </a>

        <a href="produto2.html" target="_blank" class="item">
          <img src="hoddie.webp" alt="MOLETOM BRUTO">
          <p class="item-name">MOLETOM BRUTO</p>
          <p class="item-price">R$ 389,00</p>
        </a>

        <a href="produto3.html" target="_blank" class="item">
          <img src="skepta.avif" alt="CALÇA FANTASMA">
          <p class="item-name">CALÇA FANTASMA</p>
          <p class="item-price">R$ 420,00</p>
        </a>

      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="dark-footer">
    <p>&copy; 2025 BLICK. ALL RIGHTS RESERVED.</p>
  </footer>

</body>
</html>
